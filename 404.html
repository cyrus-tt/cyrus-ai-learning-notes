    <link rel="stylesheet" href="./styles.css" />
    <style>
      .err-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        min-height: 70vh;
        padding: 60px 24px;
      }
      .err-code {
        font-family: var(--font-mono);
        font-size: clamp(100px, 20vw, 200px);
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.04em;
        background: linear-gradient(135deg, var(--accent), #ff8a5c);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        opacity: 0.25;
        margin: 0;
      }
      .err-title {
        font-size: clamp(28px, 5vw, 44px);
        font-weight: 800;
        letter-spacing: -0.03em;
        margin: -20px 0 12px;
        position: relative;
      }
      .err-desc {
        font-size: 16px;
        color: var(--muted);
        line-height: 1.6;
        max-width: 36ch;
        margin: 0 0 32px;
      }
      .err-links {
        display: flex;
        gap: 10px;
      }
      .err-links a {
        font-size: 14px;
        font-weight: 500;
        padding: 10px 22px;
        border-radius: 999px;
        text-decoration: none;
        transition: all var(--duration-normal) var(--ease-out);
      }
      .err-links a:first-child {
        background: var(--ink);
        color: var(--bg);
      }
      .err-links a:first-child:hover {
        background: var(--accent);
        transform: translateY(-1px);
      }
      .err-links a:last-child {
        border: 1.5px solid var(--line);
        color: var(--ink);
      }
      .err-links a:last-child:hover {
        border-color: var(--ink);
        transform: translateY(-1px);
      }
    </style>
  </head>

      <p class="err-desc">这个链接可能已失效，或者你手滑打错了地址。没关系，回到正轨。</p>
      <div class="err-links">
        <a href="/">返回首页</a>
        <a href="/playground.html">Playground</a>
        <a href="/news.html">看 AI 资讯</a>
      </div>
