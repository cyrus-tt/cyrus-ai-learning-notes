    <script src="/ui.js"></script>
    <script src="/visit-stats.js"></script>
    <script>
      (function () {
        var list = document.getElementById('weeklyList');
        fetch('/weekly/index.json')
          .then(function (r) { return r.json(); })
          .then(function (issues) {
            if (!issues || !issues.length) {
              list.innerHTML = '<li class="empty-note">暂无周报</li>';
              return;
            }
            var html = '';
            issues.forEach(function (issue) {
              var weekNum = issue.week.split('-W')[1] || issue.week;
              html += '<li><a href="/weekly/' + issue.file + '">'
                + '<span class="post-title">Cyrus Weekly #' + parseInt(weekNum, 10) + '</span>'
                + '<span class="post-date">' + issue.dateRange + '</span>'
                + '</a></li>';
            });
            list.innerHTML = html;
          })
          .catch(function () {
            list.innerHTML = '<li class="empty-note">加载失败</li>';
          });
      })();
    </script>
